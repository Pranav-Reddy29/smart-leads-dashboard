version: "3.9"

services:
  frontend:
    build: ./client
    ports:
      - "4173:4173"
    depends_on:
      - backend

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/smart-leads-dashboard
      JWT_SECRET: smart-leads-docker-secret
      TOKEN_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:4173
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data:
